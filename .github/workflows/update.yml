name: Update GitHub Actions versions + Security Scan

on:
  schedule:
    - cron: '51 4 * * 0'   # Weekly on Sunday at 04:51 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install zizmor (security scanner)
        # zizmor is kept as an optional external tool — the update engine
        # soft-fails gracefully if it isn't present, but in CI we always want it.
        run: pip install zizmor

      - name: Run update engine (includes zizmor scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python update.py

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add actions-metadata.json actions_latest/actions.db
          if ! git diff --staged --quiet; then
            git commit -m "Engine Sync: Refresh versions, security scans, and search index"
            # Try to push, and if it fails (due to remote changes), rebase and favor our new data
            git push origin main || (git pull --rebase origin main -X theirs && git push origin main)
          fi
