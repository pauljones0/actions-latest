name: Update GitHub Actions versions

on:
  schedule:
    - cron: '51 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run update engine
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python update.py

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add actions-metadata.json actions_latest/actions.db
          git diff --staged --quiet || git commit -m "Engine Sync: Refresh versions, stats, and search index"
          git push
